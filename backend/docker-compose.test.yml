# PostgreSQL container for concurrency tests
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   python -m pytest tests/test_pg_concurrency.py -v -s
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: splitease-test-pg
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: splitease_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d splitease_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # RAM-backed for speed
